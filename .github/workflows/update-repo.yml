name: Update RPM Repository from Releases

on:
  workflow_dispatch: # Botu Actions sekmesinden manuel çalıştırmak için
  schedule:
    - cron: '0 0 * * *' # Her gece Gece Yarısı (00:00 UTC) çalışır

jobs:
  rebuild-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dosya yükleme yetkisi!

    steps:
      - name: Checkout ro-repo
        uses: actions/checkout@v4

      - name: Download Latest Release RPMs and Sort
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          # Gerekli tüm mimari klasörlerini oluşturuyoruz (SRPMS kaynak kodlar içindir)
          mkdir -p temp-downloads x86_64 noarch aarch64 SRPMS
          
          # 1. ro-Control reposundan RPM'leri indir
          echo "ro-Control paketleri indiriliyor..."
          gh release download --repo Acik-Kaynak-Gelistirme-Toplulugu/ro-Control --pattern "*.rpm" --dir temp-downloads || echo "ro-Control için RPM bulunamadı veya hata oluştu."
          
          # 2. ro-Assist reposundan RPM'leri indir
          echo "ro-Assist paketleri indiriliyor..."
          gh release download --repo Acik-Kaynak-Gelistirme-Toplulugu/ro-Assist --pattern "*.rpm" --dir temp-downloads || echo "ro-Assist için RPM bulunamadı veya hata oluştu."
          
          # İnen dosyaları tam uzantılarına göre doğru klasörlere dağıtıyoruz
          for file in temp-downloads/*.rpm; do
            if [[ -f "$file" ]]; then
              if [[ "$file" == *".x86_64.rpm" ]]; then
                mv "$file" x86_64/
                echo "$(basename $file) -> x86_64/ klasörüne taşındı."
              elif [[ "$file" == *".aarch64.rpm" ]]; then
                mv "$file" aarch64/
                echo "$(basename $file) -> aarch64/ klasörüne taşındı."
              elif [[ "$file" == *".src.rpm" ]]; then
                mv "$file" SRPMS/
                echo "$(basename $file) -> SRPMS/ klasörüne taşındı."
              elif [[ "$file" == *".noarch.rpm" ]]; then
                mv "$file" noarch/
                echo "$(basename $file) -> noarch/ klasörüne taşındı."
              else
                echo "Bilinmeyen format, atlanıyor: $(basename $file)"
              fi
            fi
          done
          
          # İşimiz bitince geçici klasörü siliyoruz
          rm -rf temp-downloads

      - name: Install createrepo_c
        run: sudo apt-get update && sudo apt-get install -y createrepo-c

      - name: Rebuild Metadata for All Architectures
        run: |
          createrepo_c x86_64/
          createrepo_c noarch/
          createrepo_c aarch64/
          createrepo_c SRPMS/

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add x86_64/ noarch/ aarch64/ SRPMS/
          git commit -m "Otomatik Güncelleme: ro-Control ve ro-Assist paketleri çekildi, metadata güncellendi" || echo "Değişiklik yok"
          git push
