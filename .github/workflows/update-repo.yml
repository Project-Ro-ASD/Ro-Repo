name: Update RPM Repository from Releases

on:
  workflow_dispatch: # Botu Actions sekmesinden manuel çalıştırmak için

jobs:
  rebuild-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dosya yükleme yetkisi!

    steps:
      # 1. Hedef depoyu (ro-repo) çalışma alanına alıyoruz
      - name: Checkout ro-repo
        uses: actions/checkout@v4

      # 2. GitHub CLI kullanarak diğer reponun Releases kısmından en son RPM'leri indiriyoruz
      - name: Download Latest Release RPMs
        env:
          # Eğer RPM'lerin olduğu repo herkese açıksa GITHUB_TOKEN yeterlidir.
          # Gizliyse (private), buraya kendi oluşturduğun bir PAT (Personal Access Token) eklemelisin.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          mkdir -p temp-downloads x86_64 noarch
          
          # DİKKAT: Aşağıdaki repo adını, RPM'lerin bulunduğu gerçek repo adıyla değiştir!
          # Şimdilik "Acik-Kaynak-Gelistirme-Toplulugu/ro-Control" olarak yazdım.
          gh release download --repo Acik-Kaynak-Gelistirme-Toplulugu/ro-Control --pattern "*.rpm" --dir temp-downloads
          
          # İnen dosyaları isimlerine bakarak uygun klasörlere taşıyoruz
          for file in temp-downloads/*.rpm; do
            if [[ -f "$file" ]]; then
              if [[ "$file" == *"noarch"* ]]; then
                mv "$file" noarch/
                echo "$(basename $file) -> noarch/ klasörüne eklendi."
              else
                mv "$file" x86_64/
                echo "$(basename $file) -> x86_64/ klasörüne eklendi."
              fi
            fi
          done
          
          # İşimiz bitince geçici klasörü siliyoruz
          rm -rf temp-downloads

      # 3. Metadata oluşturucu aracı kuruyoruz
      - name: Install createrepo_c
        run: sudo apt-get update && sudo apt-get install -y createrepo-c

      # 4. Metadata dosyalarını yeniliyoruz
      - name: Rebuild Metadata
        run: |
          createrepo_c x86_64/
          createrepo_c noarch/

      # 5. Değişiklikleri kaydedip ro-repo'ya gönderiyoruz
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add x86_64/ noarch/
          git commit -m "Otomatik Güncelleme: Release üzerinden yeni RPM paketleri çekildi ve metadata güncellendi" || echo "Değişiklik yok"
          git push
